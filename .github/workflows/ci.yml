name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      run_pipeline:
        description: Force a fresh crawl/analyze/report run before deploying
        required: false
        default: "false"
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run python -m pytest tests/ -q

  deploy:
    name: Build & deploy to Cloudflare Pages
    # Never deploy from pull requests (no secrets, must not publish).
    if: github.event_name != 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    env:
      CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Install Python dependencies
        run: uv sync --frozen

      # Persist generated data across runs so code-only pushes redeploy fast
      # without re-crawling. The weekly schedule refreshes it.
      - name: Restore analysis data cache
        uses: actions/cache@v4
        with:
          path: |
            data/raw
            data/processed
            data/analysis
            data/configs
            data/profiles
            data/cache
          key: reposignal-data-${{ github.run_id }}
          restore-keys: |
            reposignal-data-

      - name: Run pipeline (scheduled, forced, or when no data is cached yet)
        id: pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] \
            || [ "${{ inputs.run_pipeline }}" = "true" ] \
            || [ ! -f data/analysis/current.json ]; then
            echo "Running full pipeline…"
            uv run python run.py
            uv run python -m src.scripts.export_cloudflare_data
            echo "ran=true" >> "$GITHUB_OUTPUT"
          else
            echo "Reusing cached analysis data (code-only change)."
            echo "ran=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload intelligence artifacts
        if: steps.pipeline.outputs.ran == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: reposignal-intelligence
          path: |
            reports/
            data/analysis/
            data/configs/
            data/cloudflare/
            data/profiles/
            data/processed/
          if-no-files-found: warn

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install site dependencies
        working-directory: site
        run: npm ci

      - name: Build site
        working-directory: site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        if: env.CF_API_TOKEN != ''
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: site
          command: pages deploy .svelte-kit/cloudflare --project-name=reposignal --branch=main

      - name: Deployment skipped (no Cloudflare token)
        if: env.CF_API_TOKEN == ''
        run: echo "::notice::Set the CLOUDFLARE_API_TOKEN secret to enable automatic Cloudflare Pages deploys. Build succeeded; deploy step skipped."
