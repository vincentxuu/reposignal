name = "reposignal"
compatibility_date = "2026-05-27"
pages_build_output_dir = ".svelte-kit/cloudflare"

[[d1_databases]]
binding = "REPOSIGNAL_DB"
database_name = "reposignal"
database_id = "00000000-0000-0000-0000-000000000000"

[[kv_namespaces]]
binding = "REPOSIGNAL_KV"
id = "00000000000000000000000000000000"

[[r2_buckets]]
binding = "REPOSIGNAL_R2"
bucket_name = "reposignal"
